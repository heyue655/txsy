<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#041228"/>
      <stop offset="100%" stop-color="#00040e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
    <filter id="f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <!-- Soft center glow -->
  <circle cx="16" cy="16" r="12" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#c8a96e" stroke-width="0.7" opacity="0.55"/>

  <!-- 8-pointed star marks on outer ring (N/S/E/W + diagonals) -->
  <g fill="#c8a96e" opacity="0.8">
    <circle cx="16" cy="2.8" r="0.9"/>
    <circle cx="16" cy="29.2" r="0.9"/>
    <circle cx="2.8" cy="16" r="0.9"/>
    <circle cx="29.2" cy="16" r="0.9"/>
    <circle cx="6.15" cy="6.15" r="0.65"/>
    <circle cx="25.85" cy="6.15" r="0.65"/>
    <circle cx="6.15" cy="25.85" r="0.65"/>
    <circle cx="25.85" cy="25.85" r="0.65"/>
  </g>

  <!-- Inner decorative ring -->
  <circle cx="16" cy="16" r="10.2" fill="none" stroke="#c8a96e" stroke-width="0.4" opacity="0.25"/>

  <!-- Four cross ticks (connecting outer ring to inner) -->
  <g stroke="#c8a96e" stroke-width="0.5" opacity="0.4">
    <line x1="16" y1="3.5" x2="16" y2="6"/>
    <line x1="16" y1="26" x2="16" y2="28.5"/>
    <line x1="3.5" y1="16" x2="6" y2="16"/>
    <line x1="26" y1="16" x2="28.5" y2="16"/>
  </g>

  <!-- Character 虚 -->
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="STKaiti, KaiTi, SimSun, serif"
    font-size="14"
    font-weight="bold"
    fill="#c8a96e"
    filter="url(#f)"
    opacity="0.95"
  >虚</text>
</svg>